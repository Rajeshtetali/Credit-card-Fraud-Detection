name: CI/CD Pipeline

on:
  push:
    branches: [ main, "Feature/US12299344" ]
  pull_request:
    branches: [ main, "Feature/US12299344" ]

jobs:
  execute-notebook:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install jupyter nbconvert papermill pandas scikit-learn matplotlib seaborn
    
    - name: Execute notebook
      run: |
        jupyter nbconvert --to notebook --execute creditcardfraud.ipynb
